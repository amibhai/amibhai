name: Update profile README

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required to commit the generated SVGs back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dateutil lxml

      - name: Run generator
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python generate.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/profile.svg output/profile_light.svg cache/loc_cache.json
          git diff --cached --quiet || git commit -m "chore: update profile stats"
          git push
